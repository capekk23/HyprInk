[app]
AppToggle = SUPER+N
StoragePath = ~/.local/share/hyprink
# Options: bottom, background, top, overlay
Layer = bottom

[appearance]
# Options: transparent, blur, black
BackgroundMode = transparent
BlackBackgroundColor = #000000

[controls]
# Options: left, middle, right, mouse4, mouse5, or a button number
DrawButton = left
DeleteButton = middle
ResizeButton = right
DeleteDistance = 14

[drawing]
StylusSize = 4
StylusColor = #ffffff

[notes]
Font = monospace
FontSize = 16
TextColor = #ffffff
BackgroundColor = #00000099
BorderColor = #ffffffcc
BorderWidth = 1
Padding = 8
Width = 260
MinHeight = 64
