[general]
toggle_key = SUPER+N
storage_path = ~/.local/share/hyprink

[background]
# Options: transparent, blur, black
mode = transparent
black_color = #000000
blur = true

[window]
# Options: bottom, background, top, overlay
layer = bottom

[stylus]
size = 4
color = #ff3355

[notes]
font = monospace
font_size = 16
text_color = #ffffff
background_color = #00000099
border_color = #ffffffcc
border_width = 1
padding = 8
width = 260
min_height = 64
